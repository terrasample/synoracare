<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SynoraCare Logo Concepts</title>
  <style>
    :root {
      --bg: #f3f8f3;
      --card: #ffffff;
      --text: #153d23;
      --muted: #5d7d68;
      --ring: #d7e9db;
      --accent: #2f934f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 0%, #e7f3e8 0%, var(--bg) 45%, #eef6ef 100%);
      min-height: 100vh;
      padding: 32px 20px 40px;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.1;
      letter-spacing: 0.2px;
    }
    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 17px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--ring);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .preview {
      width: 100%;
      height: 180px;
      object-fit: contain;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbf8 100%);
      border-radius: 12px;
      border: 1px solid #e7efe8;
      display: block;
    }
    .meta {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .name {
      font-size: 14px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>SynoraCare Logo Concepts</h1>
    <p>Click Open file on any concept to view it directly.</p>

    <section class="grid">
      <article class="card">
        <img class="preview" src="synoracare-logo-01-heart-duo.svg" alt="Logo Concept 1" />
        <div class="meta">
          <span class="name">01 Heart Duo</span>
          <a href="synoracare-logo-01-heart-duo.svg">Open file</a>
        </div>
      </article>

      <article class="card">
        <img class="preview" src="synoracare-logo-02-shield-circuit.svg" alt="Logo Concept 2" />
        <div class="meta">
          <span class="name">02 Shield Circuit</span>
          <a href="synoracare-logo-02-shield-circuit.svg">Open file</a>
        </div>
      </article>

      <article class="card">
        <img class="preview" src="synoracare-logo-03-monogram-sc.svg" alt="Logo Concept 3" />
        <div class="meta">
          <span class="name">03 Monogram SC</span>
          <a href="synoracare-logo-03-monogram-sc.svg">Open file</a>
        </div>
      </article>

      <article class="card">
        <img class="preview" src="synoracare-logo-04-care-orbit.svg" alt="Logo Concept 4" />
        <div class="meta">
          <span class="name">04 Care Orbit</span>
          <a href="synoracare-logo-04-care-orbit.svg">Open file</a>
        </div>
      </article>

      <article class="card">
        <img class="preview" src="synoracare-logo-05-minimal-badge.svg" alt="Logo Concept 5" />
        <div class="meta">
          <span class="name">05 Minimal Badge</span>
          <a href="synoracare-logo-05-minimal-badge.svg">Open file</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
