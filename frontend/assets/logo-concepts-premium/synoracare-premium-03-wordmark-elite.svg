<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 700" role="img" aria-labelledby="title desc">
  <title id="title">SynoraCare AI Premium Logo 03</title>
  <desc id="desc">Elite legible wordmark with discreet healthcare insignia.</desc>
  <defs>
    <linearGradient id="leaf" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1C8443"/>
      <stop offset="100%" stop-color="#9AD958"/>
    </linearGradient>
  </defs>

  <rect width="2000" height="700" fill="none"/>

  <g transform="translate(1000 360)">
    <text x="0" y="0" text-anchor="middle" font-size="170" font-weight="700" font-family="Avenir Next, Helvetica Neue, Segoe UI, Arial, sans-serif" letter-spacing="0.5">
      <tspan fill="#0C5A2C">SynoraCare </tspan><tspan fill="#83CF4B">AI</tspan>
    </text>

    <g transform="translate(0 -190)">
      <path d="M-68,0 C-40,-34 -5,-34 0,0 C5,-34 40,-34 68,0 C36,18 12,42 0,74 C-12,42 -36,18 -68,0 Z" fill="url(#leaf)"/>
      <path d="M-14,26 H-4 V16 H4 V26 H14 V36 H4 V46 H-4 V36 H-14 Z" fill="#7DCB47"/>
    </g>

    <text x="0" y="84" text-anchor="middle" font-size="36" font-weight="500" fill="#3F714A" font-family="Avenir Next, Helvetica Neue, Segoe UI, Arial, sans-serif" letter-spacing="2.6">AI-POWERED CLINICAL WORKFLOWS</text>
  </g>
